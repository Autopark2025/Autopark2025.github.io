<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Labyrinthe | Autopark 2025</title>
    <style>
        :root {
            --dark: #050505;
            --accent: #00f2ff;
            --text: #e0e0e0;
            --card-bg: #0a0a0a;
        }

        body { 
            margin: 0; background-color: var(--dark); color: var(--text); 
            font-family: 'Inter', sans-serif; display: flex; flex-direction: column; 
            min-height: 100vh; padding: 20px;
        }

        /* Navigation haut de page réactive */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            max-width: 1000px; margin: 0 auto 40px; width: 100%; 
        }
        .back-btn { color: var(--accent); text-decoration: none; font-size: 0.9rem; border: 1px solid #333; padding: 8px 15px; border-radius: 20px; transition: 0.3s; }
        .back-btn:hover { background: #1a1a1a; }

        /* Contenu central */
        .content { max-width: 800px; margin: 0 auto; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 10px; color: #fff; }
        
        /* Grille réactive pour les sous-parties (Câblage / Code) */
        .nav-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; margin-top: 50px; 
        }

        .card { 
            background: var(--card-bg); border: 1px solid #1a1a1a; 
            padding: 40px; border-radius: 20px; transition: 0.4s; 
            text-decoration: none; color: var(--text); display: block;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); }
        .card h2 { margin-top: 0; color: var(--accent); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn">⬅ Retour Dashboard</a>
        <span style="color: #666; font-size: 0.8rem;">PHASE 1 : NAVIGATION</span>
    </nav>

    <div class="content">
        <h1>Mission Labyrinthe</h1>
        <p style="color: #888;">Analyse des données capteurs et algorithme de décision pour la résolution autonome.</p>

        <section class="nav-grid">
            <a href="cablage.html" class="card">
                <h2>Câblage</h2>
                <p>Schéma électronique complet et assignation des broches I/O.</p>
            </a>

            <a href="code.html" class="card">
                <h2>Code Source</h2>
                <p>Logique algorithmique et scripts de navigation Arduino.</p>
            </a>
        </section>
    </div>

</body>
</html>
