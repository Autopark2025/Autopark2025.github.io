<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mission Labyrinthe | Autopark 2025</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --dark: #050505; --accent: #00f2ff; }
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
        body { background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; margin: 0; min-height: 100vh; }
        h1 { margin-bottom: 40px; position: relative; z-index: 1; }
        .grid { display: flex; flex-direction: column; gap: 40px; width: 90%; max-width: 600px; z-index: 1; }
        .card { padding: 50px; background: #0a0a0a; border: 1px solid #333; text-decoration: none; color: #fff; border-radius: 20px; text-align: center; transition: 0.4s; position: relative; overflow: hidden; cursor: pointer; font-size: 1.8rem; font-weight: bold; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        .card:nth-child(1) { animation: float 4s ease-in-out infinite; }
        .card:nth-child(2) { animation: float 5s ease-in-out infinite; }
        .card:nth-child(3) { animation: float 6s ease-in-out infinite; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(300px circle at var(--x, 50%) var(--y, 50%), rgba(0, 242, 255, 0.3), transparent 80%); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .card:hover::before { opacity: 1; }
        .card:hover { border-color: var(--accent); transform: translateY(-20px); }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <h1>Mission Labyrinthe</h1>
    <div class="grid">
        <a href="cablage.html" class="card">🔌 Câblage</a>
        <a href="code.html" class="card">⚙️ Code Source</a>
        <a href="tests.html" class="card">📊 Tests & Validation</a>
    </div>

    <script>
        particlesJS("particles-js", {"particles":{"number":{"value":80},"color":{"value":"#00f2ff"},"shape":{"type":"edge"},"line_linked":{"enable":true,"distance":150,"color":"#00f2ff","opacity":0.4}},"interactivity":{"events":{"onhover":{"enable":true,"mode":"grab"}}}});
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                card.style.setProperty('--x', `${e.clientX - rect.left}px`);
                card.style.setProperty('--y', `${e.clientY - rect.top}px`);
            });
        });
    </script>
</body>
</html>
