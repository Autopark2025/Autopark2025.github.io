<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mission Labyrinthe | Autopark 2025</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --dark: #050505; --accent: #00f2ff; }
        body { background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
        h1 { margin-bottom: 40px; position: relative; z-index: 1; }
        .grid { display: flex; flex-direction: column; gap: 30px; z-index: 1; }
        .card { padding: 40px; background: #0a0a0a; border: 1px solid #333; color: #fff; text-decoration: none; border-radius: 20px; text-align: center; font-weight: bold; font-size: 1.5rem; transition: 0.3s; }
        .card:hover { border-color: var(--accent); }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <h1>Mission Labyrinthe</h1>
    <div class="grid">
        <a href="cablage.html" class="card">🔌 Câblage</a>
        <a href="code.html" class="card">⚙️ Code Source</a>
        <a href="tests.html" class="card">📊 Tests & Validation</a>
    </div>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 200 },
                "color": { "value": "#00f2ff" },
                "shape": { "type": "circle" },
                "line_linked": { "enable": true, "distance": 220, "color": "#00f2ff", "opacity": 0.8, "width": 2 }
            }
        });
    </script>
</body>
</html>
