<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mission Labyrinthe | Autopark 2025</title>
    <style>
        :root { --dark: #050505; --accent: #00f2ff; }
        body { 
            background: var(--dark); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 50px; 
            margin: 0;
        }
        
        /* Structure en colonne verticale */
        .grid { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            width: 100%; 
            max-width: 500px; 
            margin-top: 50px; 
        }
        
        /* Boutons agrandis */
        .card { 
            padding: 40px; 
            background: #111; 
            border: 2px solid #333; 
            text-decoration: none; 
            color: #fff; 
            border-radius: 20px; 
            text-align: center; 
            transition: 0.3s;
            font-size: 1.5rem; /* Texte plus grand */
            font-weight: bold;
        }
        
        .card:hover { 
            border-color: var(--accent); 
            transform: scale(1.02); 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body>
    <h1>Mission Labyrinthe</h1>
    <div class="grid">
        <a href="cablage.html" class="card">🔌 Câblage</a>
        <a href="code.html" class="card">⚙️ Code Source</a>
        <a href="tests.html" class="card">📊 Tests & Validation</a>
    </div>
</body>
</html>
