<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mission Labyrinthe | Autopark 2025</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --dark: #050505; --accent: #00f2ff; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
        
        .home-btn { position: absolute; top: 20px; left: 20px; color: #00f2ff; text-decoration: none; font-size: 1.2rem; z-index: 2; }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        .grid { display: flex; flex-direction: column; gap: 40px; z-index: 1; }
        .card { 
            padding: 40px 80px; background: #0a0a0a; border: 1px solid #333; color: #fff; 
            text-decoration: none; border-radius: 20px; text-align: center; font-weight: bold;
            font-size: 1.8rem; min-width: 350px;
            animation: float 4s ease-in-out infinite; transition: 0.3s;
        }
        .card:nth-child(2) { animation-delay: 0.5s; }
        .card:nth-child(3) { animation-delay: 1s; }
        .card:hover { border-color: var(--accent); background: #111; transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <a href="index.html" class="home-btn">🏠 Accueil</a>
    
    <div class="grid">
        <a href="cablage.html" class="card">🔌 Câblage</a>
        <a href="code.html" class="card">⚙️ Code Source</a>
        <a href="tests.html" class="card">📊 Tests & Validation</a>
    </div>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100 },
                "color": { "value": "#00f2ff" },
                "opacity": { "value": 0 }, 
                "line_linked": { "enable": true, "distance": 180, "color": "#00f2ff", "opacity": 0.8, "width": 1.5 }
            }
        });
    </script>
</body>
</html>
