<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Labyrinthe | Autopark 2025</title>
    <style>
        :root { --dark: #050505; --accent: #00f2ff; --text: #e0e0e0; }
        body { margin: 0; background-color: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Menu de navigation */
        .top-nav { 
            position: fixed; top: 0; left: 0; width: 100%; height: 60px; 
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; box-sizing: border-box; border-bottom: 1px solid #333;
            z-index: 1000;
        }
        .logo { color: #fff; font-weight: bold; text-decoration: none; font-size: 1.2rem; letter-spacing: 2px; }
        .menu-links a { color: #888; text-decoration: none; margin-left: 30px; transition: 0.3s; font-size: 0.9rem; text-transform: uppercase; }
        .menu-links a:hover { color: var(--accent); }

        .container { max-width: 900px; margin: 100px auto 40px; position: relative; padding: 20px; }
        h1 { color: #fff; font-size: 3rem; text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 20px; }
        section { margin: 40px 0; background: #0a0a0a; padding: 30px; border-radius: 20px; border: 1px solid #1a1a1a; }
        h2 { color: var(--accent); margin-top: 0; }

        /* Grille des 3 parties */
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .card { 
            background: #111; padding: 30px; border-radius: 15px; text-align: center; 
            border: 1px solid #333; text-decoration: none; color: #fff; transition: 0.4s; 
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        
        .video-box { background: #000; padding: 10px; border-radius: 10px; border: 1px solid #333; text-align: center; margin-top: 15px; }
        .back-btn { display: inline-block; margin-top: 20px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 10px 20px; border-radius: 50px; transition: 0.3s; }
        .back-btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="index.html" class="logo">AUTOPARK 2025</a>
        <div class="menu-links">
            <a href="labyrinthe.html">Labyrinthe</a>
            <a href="suivi_ligne.html">Suivi de Ligne</a>
            <a href="suivi_objets.html">Suivi d'Objets</a>
        </div>
    </nav>

    <div class="container">
        <h1>Mission Labyrinthe</h1>
        <p>Sélectionnez une phase de développement pour accéder à la documentation détaillée.</p>

        <!-- Menu des 3 parties -->
        <section>
            <h2>Exploration du Système</h2>
            <div class="nav-grid">
                <a href="cablage.html" class="card">
                    <div style="font-size: 2rem; margin-bottom: 10px;">🔌</div>
                    <h2>Câblage</h2>
                </a>
                <a href="code.html" class="card">
                    <div style="font-size: 2rem; margin-bottom: 10px;">⚙️</div>
                    <h2>Code Source</h2>
                </a>
                <a href="tests.html" class="card">
                    <div style="font-size: 2rem; margin-bottom: 10px;">📊</div>
                    <h2>Tests</h2>
                </a>
            </div>
        </section>

        <section>
            <h2>Validation Finale</h2>
            <p>Résultat du parcours complet :</p>
            <div class="video-box">
                <video width="100%" controls>
                    <source src="video_3.mp4" type="video/mp4">
                    Votre navigateur ne supporte pas la lecture de vidéos.
                </video>
            </div>
        </section>

        <a href="index.html" class="back-btn">⬅ Retour Dashboard</a>
    </div>

</body>
</html>
