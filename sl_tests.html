<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tests | Suivi de Ligne</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; padding: 40px; font-family: sans-serif; }
        
        /* Style des éclairs en arrière-plan */
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
        
        .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; background: #0a0a0a; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .video-box { background: #000; padding: 10px; border-radius: 10px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="container">
        <a href="sl_menu.html" style="color:#00f2ff; text-decoration:none;">⬅ Retour Menu</a>
        <h1>Tests & Validations</h1>
        <div class="video-grid">
            <div class="video-box">
                <p>Test Virage 90°</p>
                <video width="100%" controls><source src="video_90.mp4" type="video/mp4"></video>
            </div>
            <div class="video-box">
                <p>Validation Globale</p>
                <video width="100%" controls><source src="video_1.mp4" type="video/mp4"></video>
            </div>
            <div class="video-box">
                <p>Validation Vidéo 2</p>
                <video width="100%" controls><source src="video_2.mp4" type="video/mp4"></video>
            </div>
        </div>
    </div>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50 },
                "color": { "value": "#00f2ff" },
                "shape": { "type": "edge" },
                "opacity": { "value": 0 }, /* Cache les points */
                "size": { "value": 0 },    /* Cache les points */
                "line_linked": {
                    "enable": true,
                    "distance": 200,
                    "color": "#00f2ff",
                    "opacity": 0.5,
                    "width": 1.5
                },
                "move": { "enable": true, "speed": 2 }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "grab" } },
                "modes": { "grab": { "distance": 200, "line_linked": { "opacity": 1 } } }
            }
        });
    </script>
</body>
</html>
