<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Autopark 2025</title>
    <style>
        :root {
            --dark: #050505;
            --accent: #00f2ff;
            --text: #e0e0e0;
        }
        body { margin: 0; background-color: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* En-tête percutant */
        header { padding: 80px 20px; text-align: center; }
        h1 { font-size: 5rem; margin: 0; letter-spacing: -2px; text-transform: uppercase; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: var(--accent); letter-spacing: 5px; margin-top: 10px; font-weight: 300; }

        /* Conteneur Robot */
        .showcase { max-width: 900px; margin: -50px auto 50px; padding: 20px; }
        .robot-img { width: 100%; border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(0,242,255,0.1); border: 1px solid #222; }

        /* Grille des missions */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; max-width: 1100px; margin: 0 auto 100px; padding: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 40px; border-radius: 20px; transition: 0.4s; cursor: pointer; }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); }
        .card h2 { margin-top: 0; color: #fff; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 25px; border: 1px solid var(--accent); color: var(--accent); text-decoration: none; border-radius: 50px; transition: 0.3s; }
        .btn:hover { background: var(--accent); color: #000; }
        .disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <h1>AUTOPARK</h1>
        <p class="subtitle">SYSTÈME ROBOTIQUE MODULAIRE</p>
    </header>

    <div class="showcase">
        <img src="Robot.jpeg" alt="Robot" class="robot-img">
    </div>

    <section class="grid">
        <div class="card">
            <h2>Labyrinthe</h2>
            <p>Gestion autonome et évitement d'obstacles complexes.</p>
            <a href="labyrinthe.html" class="btn">Explorer</a>
        </div>
        <div class="card disabled">
            <h2>Suivi de Ligne</h2>
            <p>Asservissement de trajectoire haute précision.</p>
            <span class="btn">Bientôt</span>
        </div>
        <div class="card disabled">
            <h2>Suivi d'Objets</h2>
            <p>Vision embarquée et tracking dynamique.</p>
            <span class="btn">Bientôt</span>
        </div>
    </section>

</body>
</html>
