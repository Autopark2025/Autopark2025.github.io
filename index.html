<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Système Cherokey 4WD</title>
    <style>
        :root {
            --dark: #050505;
            --accent: #00f2ff;
            --text: #e0e0e0;
        }
        body { margin: 0; background-color: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; position: relative; }
        
        /* 1. Ligne horizontale (va-et-vient) */
        .scanner-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            z-index: 9999;
            pointer-events: none;
            animation: scan 4s linear infinite alternate;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        /* 2. Ligne verticale (fixe) */
        .vertical-line {
            position: fixed;
            top: 0;
            left: 50%;
            width: 1px;
            height: 100vh;
            background: rgba(0, 242, 255, 0.1);
            pointer-events: none;
            z-index: 0;
        }

        /* En-tête avec animation texte */
        header { padding: 80px 20px; text-align: center; position: relative; z-index: 1; }
        h1 { font-size: 3.5rem; margin: 0; letter-spacing: -1px; text-transform: uppercase; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .subtitle { color: var(--accent); letter-spacing: 3px; margin-top: 15px; font-weight: 300; text-transform: uppercase; font-size: 1.5rem; }
        #typing-text { color: var(--accent); font-weight: bold; }
        .cursor { color: #fff; animation: blink 0.7s infinite; margin-left: 5px; }
        @keyframes blink { 50% { opacity: 0; } }

        .showcase { max-width: 900px; margin: -50px auto 50px; padding: 20px; position: relative; z-index: 1; }
        
        .robot-img { 
            width: 100%; 
            border-radius: 30px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(0,242,255,0.1); 
            border: 1px solid #222; 
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .robot-img:hover { transform: scale(1.03) rotate(-1deg); }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; max-width: 1100px; margin: 0 auto 100px; padding: 20px; position: relative; z-index: 1; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 40px; border-radius: 20px; transition: 0.4s; cursor: pointer; }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); }
        .card h2 { margin-top: 0; color: #fff; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 25px; border: 1px solid var(--accent); color: var(--accent); text-decoration: none; border-radius: 50px; transition: 0.3s; }
        .btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <div class="scanner-line"></div>
    <div class="vertical-line"></div>

    <header>
        <h1>SYSTÈME CHEROKEY 4WD</h1>
        <p class="subtitle">
            <span id="typing-text"></span><span class="cursor">|</span>
        </p>
    </header>

    <div class="showcase">
        <img src="Robot.jpeg" alt="Robot" class="robot-img">
    </div>

    <section class="grid">
        <div class="card">
            <h2>Labyrinthe</h2>
            <p>Gestion autonome et évitement d'obstacles complexes.</p>
            <a href="labyrinthe.html" class="btn">Explorer</a>
        </div>
        
        <div class="card">
            <h2>Suivi de Ligne</h2>
            <p>Asservissement de trajectoire haute précision.</p>
            <a href="suivi_ligne.html" class="btn">Explorer</a>
        </div>

        <div class="card">
            <h2>Suivi d'Objets</h2>
            <p>Vision embarquée et tracking dynamique.</p>
            <span class="btn">Bientôt</span>
        </div>
    </section>

    <script>
        const textElement = document.getElementById('typing-text');
        const phrases = ["ROBOT AUTONOME", "GESTION LABYRINTHE", "SUIVI DE TRAJECTOIRE", "VISION EMBARQUÉE"];
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentPhrase = phrases[phraseIndex];
            
            if (isDeleting) {
                textElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 80 : 150;

            if (!isDeleting && charIndex === currentPhrase.length) {
                typeSpeed = 2000; // Pause avant d'effacer
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
            }

            setTimeout(type, typeSpeed); 
        }

        type();
    </script>
</body>
</html>
