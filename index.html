<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Projet Autopark 2025</title>
    <style>
        :root {
            --bg-dark: #06060e;
            --card-bg: rgba(17, 17, 38, 0.7);
            --accent-cyan: #00ffcc;
            --accent-blue: #0077ff;
            --text-main: #ffffff;
            --text-muted: #8b8da9;
            --border-color: rgba(31, 31, 62, 0.6);
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-dark); background-image: linear-gradient(rgba(0, 255, 204, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 204, 0.02) 1px, transparent 1px); background-size: 30px 30px; color: var(--text-main); margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        .container { max-width: 1100px; width: 100%; padding: 50px 20px; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 204, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }

        .robot-showcase { display: flex; justify-content: center; margin-bottom: 60px; }
        .robot-box { background: linear-gradient(135deg, rgba(17, 17, 38, 0.8), rgba(10, 10, 20, 0.9)); border: 2px solid var(--border-color); border-radius: 24px; padding: 15px; max-width: 600px; width: 100%; }
        .robot-box img { width: 100%; height: 380px; object-fit: cover; border-radius: 16px; display: block; }
        .parts-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        @media (min-width: 768px) { .parts-grid { grid-template-columns: repeat(3, 1fr); } }
        .part-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; transition: all 0.3s; }
        .part-card.active { border-color: var(--accent-cyan); }
        .btn-enter { display: block; text-align: center; padding: 14px; background: linear-gradient(135deg, var(--accent-blue), #0044cc); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }
        .btn-disabled { background: rgba(31, 31, 62, 0.4); color: rgba(139, 141, 169, 0.5); cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <header style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 50px; border-bottom: 1px solid var(--border-color); padding-bottom: 25px;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <div>
                    <h1 style="font-size: 2.8rem; font-weight: 900; margin: 0; background: linear-gradient(45deg, #ffffff, var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AUTOPARK 2025</h1>
                    <p style="color: var(--text-muted); font-size: 0.95rem; margin: 5px 0 0 0; text-transform: uppercase; letter-spacing: 2px;">Système Robotique Mobile Modulaire</p>
                </div>
                <div style="display: flex; align-items: center; gap: 12px; background: rgba(0, 255, 204, 0.05); border: 1px solid rgba(0, 255, 204, 0.2); padding: 10px 18px; border-radius: 30px;">
                    <span style="width: 10px; height: 10px; background-color: var(--accent-cyan); border-radius: 50%; animation: pulse 2s infinite;"></span>
                    <span style="font-family: monospace; font-size: 0.85rem; color: var(--accent-cyan);">ROMEO_BLE : CONNECTED</span>
                </div>
            </div>
            <div style="display: flex; gap: 20px; font-family: monospace; font-size: 0.85rem; color: var(--text-muted);">
                <div style="background: rgba(255,255,255,0.03); padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);">L2 Électronique</div>
                <div style="background: rgba(255,255,255,0.03); padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);">PHASE 1_COMPLETED</div>
            </div>
        </header>

        <div class="robot-showcase">
            <div class="robot-box"><img src="Robot.jpeg" alt="Robot Cherokey 4WD"></div>
        </div>

        <div class="parts-grid">
            <div class="part-card active">
                <h3>🚀 Mission Labyrinthe</h3>
                <p>Système d'évitement d'obstacles (URM37).</p>
                <a href="labyrinthe.html" class="btn-enter">Entrer dans la Partie 1 ➔</a>
            </div>
            <div class="part-card"><h3 style="color:var(--text-muted)">🛣️ Suivi de Lignes</h3><p>En développement.</p><a href="#" class="btn-enter btn-disabled">Verrouillé</a></div>
            <div class="part-card"><h3 style="color:var(--text-muted)">🎯 Suivi d'Objets</h3><p>En projet.</p><a href="#" class="btn-enter btn-disabled">Verrouillé</a></div>
        </div>
    </div>
</body>
</html>
