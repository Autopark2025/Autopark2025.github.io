<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Système Cherokey 4WD</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root {
            --dark: #050505;
            --accent: #ff8c00; 
            --text: #e0e0e0;
        }
        body { margin: 0; background-color: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; position: relative; }
        
        /* Fond de réseau type "éclairs" */
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 0; }
        .main-content { position: relative; z-index: 1; }

        .scanner-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent); box-shadow: 0 0 15px var(--accent);
            z-index: 9999; pointer-events: none; animation: scan 4s linear infinite alternate;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        header { padding: 80px 20px; text-align: center; }
        h1 { font-size: 3.5rem; margin: 0; letter-spacing: -1px; text-transform: uppercase; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .subtitle { color: var(--accent); letter-spacing: 3px; margin-top: 15px; font-weight: 300; text-transform: uppercase; font-size: 1.5rem; }
        #typing-text { color: var(--accent); font-weight: bold; }
        .cursor { color: #fff; animation: blink 0.7s infinite; margin-left: 5px; }
        @keyframes blink { 50% { opacity: 0; } }

        .showcase { max-width: 900px; margin: -50px auto 50px; padding: 20px; }
        .robot-img { 
            width: 100%; border-radius: 30px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 20px rgba(255,140,0,0.2); 
            border: 1px solid #332200; transition: 0.5s;
        }
        .robot-img:hover { transform: scale(1.03) rotate(-1deg); }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; max-width: 1100px; margin: 0 auto 100px; padding: 20px; }
        
        .card { 
            background: #0a0a0a; border: 1px solid #2a1a00; padding: 40px; border-radius: 20px; 
            transition: 0.4s; cursor: pointer; position: relative; overflow: hidden; 
        }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); }
        
        .card::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(200px circle at var(--x, 50%) var(--y, 50%), rgba(255, 140, 0, 0.15), transparent 80%);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .card:hover::before { opacity: 1; }
        
        .card h2 { margin-top: 0; color: #fff; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 25px; border: 1px solid var(--accent); color: var(--accent); text-decoration: none; border-radius: 50px; transition: 0.3s; }
        .btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div class="scanner-line"></div>

    <div class="main-content">
        <header>
            <h1>SYSTÈME CHEROKEY 4WD</h1>
            <p class="subtitle"><span id="typing-text"></span><span class="cursor">|</span></p>
        </header>

        <div class="showcase">
            <img src="Robot.jpeg" alt="Robot" class="robot-img">
        </div>

        <section class="grid">
            <div class="card">
                <h2>Labyrinthe</h2>
                <p>Gestion autonome et évitement d'obstacles complexes.</p>
                <a href="labyrinthe.html" class="btn">Explorer</a>
            </div>
            <div class="card">
                <h2>Suivi de Ligne</h2>
                <p>Asservissement de trajectoire haute précision.</p>
                <a href="suivi_ligne.html" class="btn">Explorer</a>
            </div>
            <div class="card">
                <h2>Suivi d'Objets</h2>
                <p>Vision embarquée et tracking dynamique.</p>
                <span class="btn">Bientôt</span>
            </div>
        </section>
    </div>

    <script>
        // Effet Réseau électrique Orange
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#ff8c00" },
                "shape": { "type": "edge" },
                "size": { "value": 0 },
                "line_linked": { "enable": true, "distance": 180, "color": "#ff8c00", "opacity": 0.4, "width": 1.5 },
                "move": { "enable": true, "speed": 2 }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "grab" } },
                "modes": { "grab": { "distance": 200, "line_linked": { "opacity": 1 } } }
            }
        });

        // Texte dynamique
        const textElement = document.getElementById('typing-text');
        const phrases = ["ROBOT AUTONOME", "GESTION LABYRINTHE", "SUIVI DE TRAJECTOIRE", "VISION EMBARQUÉE"];
        let phraseIndex = 0, charIndex = 0, isDeleting = false;

        function type() {
            const currentPhrase = phrases[phraseIndex];
            textElement.textContent = isDeleting ? currentPhrase.substring(0, charIndex - 1) : currentPhrase.substring(0, charIndex + 1);
            charIndex = isDeleting ? charIndex - 1 : charIndex + 1;
            
            if (!isDeleting && charIndex === currentPhrase.length) { setTimeout(() => isDeleting = true, 2000); }
            else if (isDeleting && charIndex === 0) { isDeleting = false; phraseIndex = (phraseIndex + 1) % phrases.length; }
            setTimeout(type, isDeleting ? 80 : 150);
        }
        type();

        // Halo souris
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                card.style.setProperty('--x', `${e.clientX - rect.left}px`);
                card.style.setProperty('--y', `${e.clientY - rect.top}px`);
            });
        });
    </script>
</body>
</html>
