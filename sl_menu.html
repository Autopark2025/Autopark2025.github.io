<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Menu Suivi de Ligne</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        
        .btn { 
            width: 500px; padding: 45px; margin: 20px; 
            background: #0a0a0a; border: 2px solid #333; 
            text-decoration: none; color: #fff; border-radius: 30px; 
            text-align: center; font-weight: bold; font-size: 2rem; 
            transition: 0.3s; animation: float 4s ease-in-out infinite; 
        }
        .btn:hover { border-color: #00f2ff; background: #111; transform: scale(1.1); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <a href="sl_objectifs.html" class="btn">Objectifs</a>
    <a href="sl_code.html" class="btn">Code Source</a>
    <a href="sl_tests.html" class="btn">Tests & Validations</a>
    
    <a href="index.html" style="margin-top:40px; color:#00f2ff; text-decoration:none; font-size: 1.2rem;">⬅ Retour Accueil</a>
    
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00f2ff" },
                "shape": { "type": "edge" },
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.6, "width": 2 }
            }
        });
    </script>
</body>
</html>
