<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Suivi de Ligne | Système Cherokey 4WD</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --dark: #050505; --accent: #00f2ff; }
        body { margin: 0; background: #000; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }
        
        /* Animation de flottement pour les boutons */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        
        .menu-wrapper { display: flex; flex-direction: column; gap: 30px; z-index: 2; }
        
        .menu-btn { 
            width: 400px; padding: 30px; background: #0a0a0a; border: 1px solid #333; 
            color: #fff; text-decoration: none; border-radius: 20px; text-align: center; 
            font-weight: bold; font-size: 1.5rem; transition: 0.3s;
            animation: float 4s ease-in-out infinite;
        }
        .menu-btn:nth-child(1) { animation-delay: 0s; }
        .menu-btn:nth-child(2) { animation-delay: 0.5s; }
        .menu-btn:nth-child(3) { animation-delay: 1s; }
        
        .menu-btn:hover { border-color: var(--accent); background: #111; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="menu-wrapper">
        <a href="#objectifs" class="menu-btn">Objectifs</a>
        <a href="#code" class="menu-btn">Code Source</a>
        <a href="#tests" class="menu-btn">Tests & Validations</a>
    </div>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50 },
                "color": { "value": "#00f2ff" },
                "shape": { "type": "edge" },
                "opacity": { "value": 0 }, // Opacité 0 pour masquer les points
                "line_linked": { "enable": true, "distance": 200, "color": "#00f2ff", "opacity": 0.6, "width": 1.5 }
            }
        });
    </script>
</body>
</html>
