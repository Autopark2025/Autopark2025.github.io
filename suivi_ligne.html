    <style>
        :root { --dark: #050505; --accent: #00f2ff; --text: #e0e0e0; }
        body { margin: 0; background-color: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; position: relative; padding: 40px; }
        
        /* On garde les lignes de design pour la cohérence */
        .scanner-line { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: var(--accent); box-shadow: 0 0 15px var(--accent); z-index: 9999; pointer-events: none; animation: scan 4s linear infinite alternate; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .vertical-line { position: fixed; top: 0; left: 50%; width: 1px; height: 100vh; background: rgba(0, 242, 255, 0.1); pointer-events: none; z-index: 0; }

        /* Structure de la page */
        .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
        h1 { color: #fff; font-size: 3rem; text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 20px; }
        section { margin: 40px 0; background: #0a0a0a; padding: 30px; border-radius: 20px; border: 1px solid #1a1a1a; }
        h2 { color: var(--accent); margin-top: 0; }
        pre { background: #000; padding: 20px; border-radius: 10px; color: #00f2ff; overflow-x: auto; border: 1px solid #333; }
        .back-btn { display: inline-block; margin-top: 20px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 10px 20px; border-radius: 50px; transition: 0.3s; }
        .back-btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
